name: Master Games Cloud Worker

on:
  schedule:
    # မြန်မာစံတော်ချိန် ည ၁၂ နာရီတိတိ (UTC 17:30) တွင် နေ့စဉ် Auto Run ရန်
    - cron: '30 17 * * *'
  
  # GitHub ပေါ်မှ ကိုယ်တိုင် Click နှိပ်၍ Run နိုင်ရန် (Setup နှင့် Daily ရွေးချယ်နိုင်သည်)
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Choose Action (setup or daily)'
        required: true
        default: 'daily'
        type: choice
        options:
          - setup
          - daily

permissions:
  contents: write

jobs:
  run-cloud-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install chess requests

      - name: Execute Selected Script
        run: |
          if [ "${{ github.event.inputs.action_type }}" == "setup" ]; then
            echo "Running Initial Setup for 7 Days..."
            python setup_initial_games.py
          else
            echo "Running Daily Updater..."
            python generate_master_games.py
          fi

      - name: Commit and Push Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_games/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Cloud Worker: Master Games Database Updated" && git push)
